app:
  name: "ai-pytest-playwright"
  default_env: "${TEST_ENV:-staging}"

environments:
  local:
    base_url: "http://localhost:3000"
  staging:
    base_url: "https://the-internet.herokuapp.com"
  production:
    base_url: "https://the-internet.herokuapp.com"

browser:
  type: chromium
  headless: false
  viewport:
    width: 1280
    height: 720
  slow_mo: 100

timeouts:
  default: 30000
  navigation: 60000

retry:
  count: 2
  delay_ms: 500

auth:
  strategy: "form"
  state_file: ".playwright/.auth/user.json"
  credentials:
    username: "${TEST_USERNAME:-tomsmith}"
    password: "${TEST_PASSWORD:-SuperSecretPassword!}"

# 命名路由 — 故事（stories）按名称引用这些路由，而非硬编码路径。
# 当某个故事指向一个所有故事都应知晓的页面时，在此添加新路由。
routes:
  login: "/login"
  secure: "/secure"
  add_remove: "/add_remove_elements/"
  checkboxes: "/checkboxes"
  dropdown: "/dropdown"
  status_codes: "/status_codes"
